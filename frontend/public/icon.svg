<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: solid blue, macOS-style rounded corners (~22%) -->
  <rect width="512" height="512" rx="112" fill="#3b82f6"/>

  <!-- Card 3 (back) — rotated -7deg -->
  <rect x="176" y="76" width="232" height="320" rx="20" fill="rgba(255,255,255,0.14)" transform="rotate(-7 292 236)"/>

  <!-- Card 2 (middle) — rotated -3.5deg -->
  <rect x="160" y="92" width="232" height="320" rx="20" fill="rgba(255,255,255,0.30)" transform="rotate(-3.5 276 252)"/>

  <!-- Card 1 (front) — white, straight -->
  <rect x="140" y="108" width="232" height="320" rx="20" fill="#fff"/>

  <!-- Text lines on front card -->
  <line x1="192" y1="172" x2="312" y2="172" stroke="#b0c4d8" stroke-width="14" stroke-linecap="round"/>
  <line x1="192" y1="208" x2="272" y2="208" stroke="#ccd8e4" stroke-width="12" stroke-linecap="round"/>

  <!-- Checkmark — bold, centered in card area -->
  <polyline points="200,304 240,348 332,240" stroke="#2563eb" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
