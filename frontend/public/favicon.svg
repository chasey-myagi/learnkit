<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#3b82f6"/>

  <!-- Single card — simplified for small sizes -->
  <rect x="6" y="5" width="20" height="23" rx="3" fill="#fff"/>

  <!-- Text line hint — just one line to suggest "document" -->
  <line x1="11" y1="11" x2="21" y2="11" stroke="#c0d0e4" stroke-width="2" stroke-linecap="round"/>

  <!-- Checkmark — thick, optically centered in lower card area -->
  <polyline points="11,19 14.5,23 22,13" stroke="#2563eb" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
