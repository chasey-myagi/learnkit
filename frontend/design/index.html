<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnKit — Design Cases</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0e0e1a;
  --surface: #1a1a2e;
  --border: #2e2e50;
  --text: #e0e0f0;
  --muted: #8888aa;
  --primary: #6c5ce7;
  --accent: #fd79a8;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

.toolbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--primary);
  white-space: nowrap;
  margin-right: 4px;
}
.sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

/* Group labels */
.group-label {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  margin-left: 4px;
}

.tabs { display: flex; gap: 3px; }
.tab {
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 0.72rem;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); background: rgba(108,92,231,0.1); }
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.tab.active-lesson { background: var(--accent); color: #fff; border-color: var(--accent); }

.view { flex: 1; min-height: 0; }
.view iframe { width: 100%; height: 100%; border: none; }

.hint {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 12px;
  font-size: 0.65rem;
  color: var(--muted);
  z-index: 100;
  display: flex;
  gap: 12px;
  opacity: 0.6;
}
.hint kbd {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0 4px;
  font-family: monospace;
  font-size: 0.62rem;
  color: var(--text);
}
</style>
</head>
<body>

<div class="toolbar">
  <span class="logo">LearnKit</span>
  <div class="sep"></div>
  <span class="group-label">应用壳</span>
  <div class="tabs" id="app-tabs">
    <button class="tab active" data-i="0">Header</button>
    <button class="tab" data-i="1">ProgramCard</button>
    <button class="tab" data-i="2">Subject+Lesson</button>
    <button class="tab" data-i="3">Progress</button>
    <button class="tab" data-i="4">UI 全貌</button>
  </div>
  <div class="sep"></div>
  <span class="group-label">教案模板</span>
  <div class="tabs" id="lesson-tabs">
    <button class="tab" data-i="5">A 技术文档</button>
    <button class="tab" data-i="6">B 杂志</button>
    <button class="tab" data-i="7">C 笔记本</button>
  </div>
</div>

<div class="view">
  <iframe id="frame" src="app-header-cases.html"></iframe>
</div>

<div class="hint">
  <span><kbd>1</kbd>-<kbd>5</kbd> 应用壳</span>
  <span><kbd>6</kbd>-<kbd>8</kbd> 教案模板</span>
  <span><kbd>←</kbd><kbd>→</kbd> 切换</span>
</div>

<script>
const files = [
  'app-header-cases.html',
  'program-card-cases.html',
  'subject-lesson-cases.html',
  'progress-status-cases.html',
  'UI.html',
  'lesson-template-a-cases.html',
  'lesson-template-b-cases.html',
  'lesson-template-c-cases.html'
];

let cur = 0;
const frame = document.getElementById('frame');
const allTabs = document.querySelectorAll('.tab');

function go(i) {
  if (i < 0 || i >= files.length) return;
  cur = i;
  frame.src = files[i];
  allTabs.forEach((t, j) => {
    t.classList.remove('active', 'active-lesson');
    if (j === i) t.classList.add(i >= 5 ? 'active-lesson' : 'active');
  });
}

allTabs.forEach(t => t.addEventListener('click', () => go(+t.dataset.i)));

document.addEventListener('keydown', e => {
  const keyMap = { '1':0, '2':1, '3':2, '4':3, '5':4, '6':5, '7':6, '8':7, '9':8, '0':9 };
  if (e.key in keyMap) go(keyMap[e.key]);
  else if (e.key === 'ArrowRight') go((cur + 1) % files.length);
  else if (e.key === 'ArrowLeft') go((cur - 1 + files.length) % files.length);
});
</script>
</body>
</html>
